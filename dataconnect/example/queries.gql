query ListAllProjects @auth(level: USER) {
  projects(where: { userId: { eq_expr: "auth.uid" } }) {
    id
    name
    createdAt
    user {
      displayName
    }
  }
}

mutation CreateMediaAsset($fileName: String!, $fileUrl: String!, $fileType: String!, $duration: Float) @auth(level: USER) {
  mediaAsset_insert(data: {
    userId_expr: "auth.uid",
    fileName: $fileName,
    fileUrl: $fileUrl,
    fileType: $fileType,
    duration: $duration,
    createdAt_expr: "request.time"
  })
}

query GetTemplateDetails($id: UUID!) @auth(level: USER) {
  template(id: $id) @check(expr: "this.userId == auth.uid || this.isPublic == true", message: "Not authorized to view this template") {
    name
    description
    isPublic
    user {
      displayName
    }
  }
}

mutation UpdateProjectName($projectId: UUID!, $newName: String!) @auth(level: USER) @transaction {
  query @redact {
    project(id: $projectId) @check(expr: "this != null && this.userId == auth.uid", message: "Not authorized to update this project") {
      userId
    }
  }
  project_update(
    key: { id: $projectId },
    data: {
      name: $newName,
      updatedAt_expr: "request.time"
    }
  )
}
