name: ENVI
options:
  bundleIdPrefix: com.informal
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.4"
packages:
  SDWebImage:
    url: https://github.com/SDWebImage/SDWebImage.git
    from: "5.19.0"
  Lottie:
    url: https://github.com/airbnb/lottie-spm.git
    from: "4.4.0"
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios-spm.git
    from: "5.0.0"
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk.git
    from: "11.0.0"
targets:
  ENVI:
    type: application
    platform: iOS
    sources:
      - path: ENVI
        excludes:
          - "Resources/Info.plist"
    resources:
      - path: ENVI/Resources/Fonts
      - path: ENVI/Resources/Images
      - path: ENVI/Features/Templates/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.informal.envi
        INFOPLIST_FILE: ""
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_UILaunchStoryboardName: ""
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        CODE_SIGNING_ALLOWED: "NO"
        SWIFT_VERSION: "5.0"
        MARKETING_VERSION: "2.0"
        CURRENT_PROJECT_VERSION: "1"
    dependencies:
      - package: SDWebImage
      - package: Lottie
        product: Lottie
      - package: RevenueCat
        product: RevenueCat
      - package: RevenueCat
        product: RevenueCatUI
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseAnalytics
      - package: Firebase
        product: FirebaseCrashlytics
      - package: Firebase
        product: FirebaseCore
