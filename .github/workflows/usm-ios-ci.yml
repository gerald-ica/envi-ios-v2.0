name: USM iOS CI

on:
  push:
    branches:
      - "feature/usm-**"
  workflow_dispatch:

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  xctest:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Prepare Secrets.xcconfig
        # Config/Secrets.xcconfig is gitignored; xcodegen wires it into
        # the project via `configFiles`, so the build fails without it.
        # CI runs the test suite with the template placeholder —
        # PurchaseConstants detects it and skips RevenueCat init.
        run: |
          if [ ! -f Config/Secrets.xcconfig ]; then
            cp Config/Secrets.xcconfig.template Config/Secrets.xcconfig
            echo "ℹ️  Copied Secrets.xcconfig.template → Secrets.xcconfig (CI placeholder)."
          fi

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Resolve Swift packages
        run: swift package resolve

      - name: Select simulator
        id: simulator
        run: |
          DEVICE_ID=$(xcrun simctl list devices available | awk -F '[()]' '/iPhone 16/ {print $2; exit}')
          if [ -z "$DEVICE_ID" ]; then
            DEVICE_ID=$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ {print $2; exit}')
          fi
          if [ -z "$DEVICE_ID" ]; then
            echo "No available iOS Simulator device found"
            exit 1
          fi
          echo "device_id=$DEVICE_ID" >> "$GITHUB_OUTPUT"

      - name: Run USM tests
        run: |
          xcodebuild test \
            -scheme ENVI \
            -destination "id=${{ steps.simulator.outputs.device_id }}" \
            -configuration Debug \
            -only-testing:ENVITests \
            CODE_SIGNING_ALLOWED=NO

      # Sprint-03: Device-lane template for Vision-dependent tests.
      # Uncomment and add a self-hosted runner with real-device access
      # (ANE / CoreML espresso context) to run EmbeddingIndexTests
      # and SimilarityEngineTests which fail on simulator.
