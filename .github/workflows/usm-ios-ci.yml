      #       run: |
      #         xcodebuild test \
      #           -scheme ENVI \
      #           -destination 'platform=iOS,id=${{ secrets.DEVICE_UDID }}' \
      #           -only-testing:ENVITests/EmbeddingIndexTests \
      #           -only-testing:ENVITests/SimilarityEngineTests
