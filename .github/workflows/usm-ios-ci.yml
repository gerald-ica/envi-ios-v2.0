name: USM iOS CI

on:
  push:
    branches:
      - "feature/usm-**"
  pull_request:
    branches:
      - main
    paths:
      - "ENVI/Core/USM/**"
      - "ENVITests/Core/USM/**"

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  xctest:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.0"

      - name: Cache Xcode build artifacts
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: "${{ runner.os }}-xcode-${{ hashFiles('ENVI.xcodeproj/project.pbxproj') }}"
          restore-keys: |
            ${{ runner.os }}-xcode-

      - name: Run USM tests
        run: |
          xcodebuild test \
            -scheme ENVI \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=latest' \
            -only-testing:ENVITests/UserSelfModelTests
