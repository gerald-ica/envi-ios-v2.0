name: iOS CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build-and-test:
    name: Build and test (iOS simulator)
    runs-on: macos-26
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for committed secrets
        run: |
          PATTERNS="AKIA[0-9A-Z]{16}|sk-[a-zA-Z0-9]{20,}|ghp_[a-zA-Z0-9]{36}|AIza[0-9A-Za-z_-]{35}"
          if grep -rE "$PATTERNS" --include="*.swift" --include="*.plist" --include="*.json" --include="*.yml" --include="*.yaml" . 2>/dev/null | grep -v '.build/' | grep -v 'node_modules/' | grep -v 'check-secrets' | grep -v '^./ENVI/Resources/GoogleService-Info.plist:'; then
            echo "❌ Potential secrets found in source files!"
            exit 1
          fi
          echo "✅ No secrets detected."

      - name: Cache SPM packages
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Resolve Swift packages
        run: swift package resolve

      - name: Select simulator
        id: simulator
        run: |
          DEVICE_ID=$(xcrun simctl list devices available | awk -F '[()]' '/iPhone 16/ {print $2; exit}')
          if [ -z "$DEVICE_ID" ]; then
            DEVICE_ID=$(xcrun simctl list devices available | awk -F '[()]' '/iPhone/ {print $2; exit}')
          fi
          if [ -z "$DEVICE_ID" ]; then
            echo "No available iOS Simulator device found"
            exit 1
          fi
          echo "device_id=$DEVICE_ID" >> "$GITHUB_OUTPUT"

      - name: Build
        run: |
          xcodebuild \
            -scheme ENVI \
            -destination "id=${{ steps.simulator.outputs.device_id }}" \
            -configuration Debug \
            build \
            CODE_SIGNING_ALLOWED=NO

      - name: Test
        run: |
          xcodebuild \
            -scheme ENVI \
            -destination "id=${{ steps.simulator.outputs.device_id }}" \
            -configuration Debug \
            test \
            CODE_SIGNING_ALLOWED=NO
